<!DOCTYPE html>
<html>

<head>
    <title>Aplikasi To-Do List</title>
</head>

<body>

    <h2> Ini Adalah To-Do List Sederhana</h2>

    <input type="text" id="input-todo" placeholder="Ketik tugas baru...">

    <button onclick="tambahTugas()">Tambah</button>

    <ul id="daftar-tugas"></ul>

    <script>

        var tugas = [];

        function tambahTugas() {

            var input = document.getElementById("input-todo");

            if (input.value != "") {
                tugas.push(input.value);
            }

            input.value = "";

            tampilkanDaftar();
        }

        function hapusTugas(index) {

            tugas.splice(index, 1);

            tampilkanDaftar();
        }

        function tampilkanDaftar() {

            var daftar = document.getElementById("daftar-tugas");

            daftar.innerHTML = "";

            for (let i = 0; i < tugas.length; i++) {

                daftar.innerHTML +=
                    "<li>" + tugas[i] +
                    " <button onclick='hapusTugas(" + i + ")'>Hapus</button></li>";

            }
        }

    </script>

</body>

</html>
