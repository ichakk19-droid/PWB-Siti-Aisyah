<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sederhana</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f1f3f6;
        }

        .calculator{
            width:300px;
            background:#ffffff;
            padding:20px;
            border-radius:12px;
            box-shadow:0 4px 10px rgba(0,0,0,0.15);
        }

        #display{
            width:100%;
            height:60px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:28px;
            text-align:right;
            padding:10px;
            background:#f8f9fa;
            color:#333;
        }

        .buttons{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:8px;
        }

        button{
            height:55px;
            border:none;
            border-radius:8px;
            font-size:20px;
            cursor:pointer;
            transition:0.2s;
        }

        button:hover{
            opacity:0.9;
        }

        .number{
            background:#e9ecef;
            color:#333;
        }

        .operator{
            background:#4a90e2;
            color:white;
        }

        .equal{
            background:#28a745;
            color:white;
        }

        .clear{
            background:#dc3545;
            color:white;
        }
    </style>
</head>

<body>

    <div class="calculator">

        <input type="text" id="display" disabled>

        <div class="buttons">

            <button class="number" onclick="appendValue('7')">7</button>
            <button class="number" onclick="appendValue('8')">8</button>
            <button class="number" onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('/')">÷</button>

            <button class="number" onclick="appendValue('4')">4</button>
            <button class="number" onclick="appendValue('5')">5</button>
            <button class="number" onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('*')">×</button>

            <button class="number" onclick="appendValue('1')">1</button>
            <button class="number" onclick="appendValue('2')">2</button>
            <button class="number" onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('-')">−</button>

            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="number" onclick="appendValue('0')">0</button>
            <button class="equal" onclick="calculate()">=</button>
            <button class="operator" onclick="appendValue('+')">+</button>

        </div>

    </div>

    <script>
        let display = document.getElementById("display");

        function appendValue(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = "";
        }

        function calculate() {
            try {
                display.value = eval(display.value);
            } catch {
                display.value = "Error";
            }
        }
    </script>

</body>
</html>
