<!DOCTYPE html>
<html>

<head>
    <title>Ini Adalah Latihan Validasi Form Guyss</title>

    <style>
        .error {
            color: red;
            font-size: 0.9em;
        }
    </style>

</head>

<body>

    <h2>Form Registrasi</h2>

    <form onsubmit="return validasi()">

        <label>Nama Lengkap :</label><br>
        <input type="text" id="nama"><br>
        <small id="nama-error" class="error"></small><br><br>

        <label>Email :</label><br>
        <input type="email" id="email"><br>
        <small id="email-error" class="error"></small><br><br>

        <input type="submit" value="Daftar">

    </form>

    <script>

        function validasi() {

            var nama = document.getElementById("nama").value;
            var email = document.getElementById("email").value;

            document.getElementById("nama-error").innerHTML = "";
            document.getElementById("email-error").innerHTML = "";

            if (nama == "") {
                document.getElementById("nama-error").innerHTML = "Nama tidak boleh kosong!";
                return false;
            }

            if (email == "") {
                document.getElementById("email-error").innerHTML = "Email tidak boleh kosong!";
                return false;
            }

            alert("Registrasi berhasil!");

            return true;
        }

    </script>

</body>

</html>
