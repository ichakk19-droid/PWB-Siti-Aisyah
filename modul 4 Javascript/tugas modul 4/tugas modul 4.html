<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Toko Elektronik Cepat </title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f2f2f2;
            padding:20px;
        }

        h1{
            color:#16b8fe;
            margin-bottom:10px;
        }

        #jam{
            font-size:18px;
            color:#444;
            margin-bottom:20px;
        }

        .container{
            display:grid;
            grid-template-columns:250px 1fr;
            gap:20px;
        }

        .sidebar{

            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 8px rgba(0,0,0,.2);

        }

        .sidebar h2{
            margin-bottom:15px;
        }

        .sidebar ul{

            list-style:none;

        }

        .sidebar li{

            padding:12px;
            margin-bottom:10px;
            background:#e9ecef;
            cursor:pointer;
            border-radius:6px;
            transition:.3s;

        }

        .sidebar li:hover{

            background:#0d6efd;
            color:white;

        }

        .content{

            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 8px rgba(0,0,0,.2);

        }

        .produk{

            text-align:center;

        }

        .produk img{

            width:450px;
            height:300px;
            object-fit:cover;
            border-radius:10px;
            border:2px solid #ddd;

        }

        .produk h2{

            margin-top:15px;

        }

        .harga{

            color:red;
            font-size:22px;
            margin:10px 0;

        }

        button{

            padding:10px 20px;
            cursor:pointer;
            border:none;
            border-radius:5px;
            background:#0d6efd;
            color:white;
            margin:5px;

        }

        button:hover{

            background:#084298;

        }

        form{

            margin-top:30px;

        }

        label{

            display:block;
            margin-top:15px;
            margin-bottom:5px;

        }

        input{

            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;

        }

        #output{

            margin-top:30px;
            background:#f8f9fa;
            padding:20px;
            border-radius:10px;
            border-left:5px solid green;

        }

        @media(max-width:768px){

            .container{

                grid-template-columns:1fr;

            }

            .produk img{

                width:100%;
                height:auto;

            }

        }

    </style>

</head>

<body>

<h1>Toko Elektronik Cepat</h1>

<div id="jam"></div>

<div class="container">

    <!-- DAFTAR PRODUK -->

    <div class="sidebar">

        <h2>Daftar Produk</h2>

        <ul id="daftarProduk">

        </ul>

    </div>

    <!-- PRODUK -->

    <div class="content">

        <div class="produk">

            <img id="gambarProduk">

            <br><br>

            <button onclick="gantiGambar(-1)">Previous</button>

            <button onclick="gantiGambar(1)">Next</button>

            <h2 id="namaProduk"></h2>

            <div class="harga" id="hargaProduk"></div>

        </div>

        <form onsubmit="return pesanProduk()">

            <h2>Form Pemesanan</h2>

            <label>Nama Pemesan</label>

            <input
            type="text"
            id="nama">

            <label>Jumlah Pesan</label>

            <input
            type="number"
            id="jumlah">

            <label>Kode Promo</label>

            <input
            type="text"
            id="promo"
            placeholder="DISKON10">

            <br><br>

            <button type="submit">

                Pesan Sekarang

            </button>

        </form>

        <div id="output">

            Silakan melakukan pemesanan.

        </div>

    </div>

</div>

<script>
    // =======================
// DATA PRODUK
// =======================

var produk = [

{
    nama:"Laptop ASUS Vivobook",
    harga:8500000,
    gambar:[
        "https://i.pinimg.com/736x/f2/2a/ce/f22ace9a7223abb3c854484420431b1b.jpg",
        "https://i.pinimg.com/736x/dc/4a/67/dc4a677c2b813cbb740ff2afaea4d9a0.jpg",
        "https://i.pinimg.com/736x/01/b8/16/01b816a7cb4f462f3c5dc395bddff903.jpg"
    ]
},

{
    nama:"Samsung Galaxy S24",
    harga:12000000,
    gambar:[
        "https://i.pinimg.com/736x/00/9b/91/009b91eaa9c50df8e5d5681cbde9a9c3.jpg",
        "https://i.pinimg.com/1200x/81/99/58/819958ffa3dabe545cafee9a2dcee538.jpg",
        "https://i.pinimg.com/736x/2b/fd/46/2bfd4687510fe6c65ce5df9a4b771406.jpg"
    ]
},

{
    nama:"Headset Gaming",
    harga:750000,
    gambar:[
        "https://i.pinimg.com/1200x/7e/37/f7/7e37f7bf17027c0d2b7fc651c4d36c27.jpg",
        "https://i.pinimg.com/736x/ab/44/ca/ab44caf8a0726cc6823a5f9cb822106a.jpg",
        "https://i.pinimg.com/736x/bd/77/8c/bd778ca8c0fddde7d1513937fd676328.jpg"
    ]
}

];

// =======================
// VARIABEL
// =======================

var produkAktif = 0;
var gambarAktif = 0;

// =======================
// JAM DIGITAL
// =======================

function updateJam(){

    var sekarang = new Date();

    document.getElementById("jam").innerHTML =
    sekarang.toLocaleDateString("id-ID")+
    " | "+
    sekarang.toLocaleTimeString("id-ID");

}

setInterval(updateJam,1000);
updateJam();

// =======================
// MENAMPILKAN DAFTAR PRODUK
// =======================

var daftar = document.getElementById("daftarProduk");

for(let i=0;i<produk.length;i++){

    daftar.innerHTML +=
    "<li onclick='pilihProduk("+i+")'>"+
    produk[i].nama+
    "</li>";

}
// =======================
// MENAMPILKAN PRODUK
// =======================

function tampilProduk(){

    document.getElementById("gambarProduk").src =
    produk[produkAktif].gambar[gambarAktif];

    document.getElementById("namaProduk").innerHTML =
    produk[produkAktif].nama;

    document.getElementById("hargaProduk").innerHTML =
    "Rp "+produk[produkAktif].harga.toLocaleString("id-ID");

}

// =======================
// PILIH PRODUK
// =======================

function pilihProduk(index){

    produkAktif=index;

    gambarAktif=0;

    tampilProduk();

}

// =======================
// SLIDESHOW
// =======================

function gantiGambar(arah){

    gambarAktif+=arah;

    if(gambarAktif>=produk[produkAktif].gambar.length){

        gambarAktif=0;

    }

    if(gambarAktif<0){

        gambarAktif=
        produk[produkAktif].gambar.length-1;

    }

    tampilProduk();

}

// tampilkan produk pertama

tampilProduk();
// =======================
// PEMESANAN
// =======================

function pesanProduk(){

    var nama = document.getElementById("nama").value.trim();

    var jumlah = parseInt(document.getElementById("jumlah").value);

    var promo = document.getElementById("promo").value.toUpperCase();

    if(nama==""){

        alert("Nama pemesan tidak boleh kosong!");

        return false;

    }

    if(isNaN(jumlah) || jumlah<=0){

        alert("Jumlah pesanan harus lebih dari 0!");

        return false;

    }

    var harga = produk[produkAktif].harga;

    var subtotal = harga * jumlah;

    var diskon = 0;

    if(promo=="DISKON10"){

        diskon = subtotal * 0.10;

    }

    var total = subtotal - diskon;

    var orderID =
    "INV-"+Math.floor(Math.random()*90000+10000);

    document.getElementById("output").innerHTML =

    "<h2>Struk Pemesanan</h2>"+

    "<hr>"+

    "<p><b>Order ID :</b> "+orderID+"</p>"+

    "<p><b>Nama Pemesan :</b> "+nama+"</p>"+

    "<p><b>Produk :</b> "+produk[produkAktif].nama+"</p>"+

    "<p><b>Jumlah :</b> "+jumlah+"</p>"+

    "<p><b>Harga :</b> Rp "+harga.toLocaleString("id-ID")+"</p>"+

    "<p><b>Subtotal :</b> Rp "+subtotal.toLocaleString("id-ID")+"</p>"+

    "<p><b>Potongan :</b> Rp "+diskon.toLocaleString("id-ID")+"</p>"+

    "<h3>Total Bayar : Rp "+total.toLocaleString("id-ID")+"</h3>";

    return false;

}

</script>

</body>
</html>
