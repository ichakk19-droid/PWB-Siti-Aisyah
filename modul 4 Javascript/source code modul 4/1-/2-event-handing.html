<!DOCTYPE html>
<html lang="en">
<head>
    <title>Latihan Event Handling</title>

    <style>
        #inputNama {
            border: 2px solid #ccc;
            padding: 8px;
            transition: border-color 0.3s;
        }

        #inputNama:focus {
            border-color: dodgerblue;
        }
    </style>
</head>

<body>

    <h3>Event onmouseover & onmouseout</h3>

    <img id="gambar"
         src="https://i.pinimg.com/736x/a0/61/81/a061816721aebd2be0fb2c3f2d3f3658.jpg"
         alt="Gambar"
         onmouseover="gantiGambar()"
         onmouseout="kembalikanGambar()">

    <hr>

    <h3>Event onfocus & onchange</h3>

    <label for="inputNama">Ketik Nama Anda:</label>
    <input type="text" id="inputNama" onchange="tampilkanOutput()">

    <p>Output: <span id="hasil"></span></p>

    <script>
        function gantiGambar() {
            document.getElementById("gambar").src =
                "https://i.pinimg.com/736x/79/16/8a/79168a9e77c7394a3357fa55a5b181ce.jpg";
        }

        function kembalikanGambar() {
            document.getElementById("gambar").src =
                "https://i.pinimg.com/736x/a0/61/81/a061816721aebd2be0fb2c3f2d3f3658.jpg";
        }

        function tampilkanOutput() {
            var nilaiInput = document.getElementById("inputNama").value;
            document.getElementById("hasil").innerHTML = "<b>" + nilaiInput + "</b>";
        }
    </script>

</body>
</html>
