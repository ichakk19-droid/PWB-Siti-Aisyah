<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Colors Bootstrap</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2>Macam-Macam Background Bootstrap</h2>

    <div class="bg-primary text-white p-3 mb-2">
        Background Primary
    </div>

    <div class="bg-success text-white p-3 mb-2">
        Background Success
    </div>

    <div class="bg-info text-white p-3 mb-2">
        Background Info
    </div>

    <div class="bg-warning p-3 mb-2">
        Background Warning
    </div>

    <div class="bg-danger text-white p-3 mb-2">
        Background Danger
    </div>

    <div class="bg-dark text-white p-3 mb-2">
        Background Dark
    </div>

</div>

</body>
</html>
