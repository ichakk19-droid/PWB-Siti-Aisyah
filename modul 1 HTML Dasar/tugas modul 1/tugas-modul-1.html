<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendaftaran Mahasiswa Baru</title>
</head>
<body style="background-color:#f5f5f5; margin:20px; font-family:Arial, sans-serif;">

    <!-- Judul Halaman -->
    <center>
        <img src="https://assets.siakadcloud.com/uploads/stitekbontang/logoaplikasi/1408.jpg"
             alt="Logo STITEK Bontang"
             width="120"
             title="Formulir Pendaftaran Mahasiswa Baru">
    </center>

    <h1 align="center">FORMULIR PENDAFTARAN MAHASISWA BARU</h1>
    <h3 align="center">SEKOLAH TINGGI TEKNOLOGI BONTANG</h3>

    <!-- Formulir -->
    <form action="#" method="post">

        <!-- Data Pribadi -->
        <fieldset>
            <legend><b>Data Pribadi</b></legend>

            <label for="nama">Nama Lengkap :</label><br>
            <input type="text"
                   id="nama"
                   name="nama"
                   placeholder="Masukkan nama lengkap"
                   required>
            <br><br>

            <label for="email">Email :</label><br>
            <input type="email"
                   id="email"
                   name="email"
                   placeholder="contoh@email.com"
                   required>
            <br><br>

            <label>Jenis Kelamin :</label><br>

            <input type="radio"
                   id="pria"
                   name="jk"
                   value="Pria"
                   required>

            <label for="pria">Pria</label>

            <input type="radio"
                   id="wanita"
                   name="jk"
                   value="Wanita">

            <label for="wanita">Wanita</label>

        </fieldset>

        <br>

        <!-- Hobi -->
        <fieldset>
            <legend><b>Hobi</b></legend>

            <input type="checkbox"
                   id="membaca"
                   name="hobi"
                   value="Membaca">

            <label for="membaca">Membaca</label><br>

            <input type="checkbox"
                   id="olahraga"
                   name="hobi"
                   value="Olahraga">

            <label for="olahraga">Olahraga</label><br>

            <input type="checkbox"
                   id="musik"
                   name="hobi"
                   value="Musik">

            <label for="musik">Musik</label><br>

            <input type="checkbox"
                   id="gaming"
                   name="hobi"
                   value="Gaming">

            <label for="gaming">Gaming</label>

        </fieldset>

        <br>

        <!-- Jurusan -->
        <fieldset>
            <legend><b>Pilihan Jurusan</b></legend>

            <label for="jurusan">Jurusan :</label><br>

            <select id="jurusan"
                    name="jurusan"
                    required>

                <option value="">
                    -- Pilih Jurusan --
                </option>

                <option value="Teknik Informatika">
                    Teknik Informatika
                </option>

                <option value="Manajemen">
                    Manajemen
                </option>

                <option value="Akuntansi">
                    Akuntansi
                </option>

                <option value="Sistem Informasi">
                    Sistem Informasi
                </option>

            </select>

        </fieldset>

        <br>

        <!-- Alamat -->
        <fieldset>
            <legend><b>Alamat</b></legend>

            <label for="alamat">
                Alamat Lengkap :
            </label><br>

            <textarea id="alamat"
                      name="alamat"
                      rows="5"
                      cols="40"
                      placeholder="Masukkan alamat lengkap"></textarea>
        
        </fieldset>

        <br>

        <!-- Tombol Submit -->
        <input type="submit" value="Daftar Sekarang">
        
    </form>

    <hr>

    <!-- Link Informasi Kampus -->
    <p>
        Informasi kampus:
        <a href="https://stitek.ac.id/"
           target="_blank"
           title="Website Resmi STITEK">
            Kunjungi Website Kampus
        </a>
    </p>

</body>
</html>
